<!DOCTYPE html>
<html>
    <head>
        <title>Practical 18(a)</title>
        <link rel="stylesheet" href="prac18b.css">
    </head>
    <body>
        <!--Header Section -->
        <div class="Header">
            <h4>Vaibhav Killa</h4>
        <p>This is Solution for Practical 18(b)</p>
        </div>
        <!-- Content-->
         <div class="Content">
            <fieldset>
                <legend>Registration Form</legend>
                <form action="timetable.html" onsubmit="return validform()">
                    <p>
                        <label for="Name">Name</label>
                        <input type="text" name="Name" id="Name" placeholder="Enter your name" >
                    </p>
                    <p>
                        <label for="Email">Email</label>
                        <input type="email" name="Email" id="Email"  placeholder="Enter your Email">
                    </p>
                    <p>
                        <label for="DOB">Date of Birth</label>
                        <input type="date" name="DOB" id="DOB">
                    </p>
                    <p>
                        <label for="Gender">Gender</label>
                        <input type="radio" name="Gender" id="Male">Male
                        <input type="radio" name="Gender" id="Female">Female

                    </p>
                    <P>
                        <label for="Phone_Number">Phone_Number</label>
                        <input type="number" name="Phone_Number" id="Phone_Number" >
                   </P>
                   <p>
                    <label for="Address">Address</label>
                    <textarea name="Address" id="Address"></textarea> 
                   </p>
                   <p>
                    <label for="hobbies">hobbies</label>
                    <input type="checkbox" name="hobbies" id="cricket">cricket
                    <input type="checkbox" name="hobbies" id="Football">Football
                    <input type="checkbox" name="hobbies" id="Basketball">Basketball
                    <input type="checkbox" name="hobbies" id="Volleyball">Volleyball
                   </p>
                   <p>
                    <label for="State">State</label>
                    <select name="State" id="State">
                    <option value="Andra Pradesh">Andra Pradesh</option>
                    <option value="Arunachal Pradesh">Arunachal Pradesh</option>
                    <option value="Assam">Assam</option>
                    <option value="Bihar">Bihar</option>
                    <option value="Chhattisgarh">Chhattisgarh</option>
                    <option value="Goa">Goa</option>
                    <option value="Gujarat">Gujarat</option>
                    <option value="Haryana">Haryana</option>
                    <option value="Himachal Pradesh">Himachal Pradesh</option>
                    <option value="Jharkhand">Jharkhand</option>
                    <option value="Kerela">Kerela</option>
                    <option value="Karnataka">Karnataka</option>
                    <option value="Madhya Pradesh">Madhya Pradesh</option>
                    <option value="Maharastra">Maharastra</option>
                    <option value="Manipur">Manipur</option>
                    <option value="Meghalaya">Meghalaya</option>
                    <option value="Mizoram">Mizoram</option>
                    <option value="Nagaland">Nagaland</option>
                    <option value="Odisha">Odisha</option>
                    <option value="Punjab">Punjab</option>
                    <option value="Rajasthan">Rajasthan</option>
                    <option value="Sikkim">Sikkim</option>
                    <option value="Tamil Nadu">Tamil Nadu</option>
                    <option value="Telengana">Telengana</option>
                    <option value="Tripura">Tripura</option>
                    <option value="Uttar Pradesh">Uttar Pradesh</option>
                    <option value="Uttar Pradesh">Uttar Pradesh</option>
                    <option value="West Bengal">West Bengal</option>
                    </select>
                   </p>
                   <p>
                    <label for=" Create_Password">Create a Password</label>
                    <input type="password" name="Create_Password" id="Create_Password" placeholder="Enter your password">
                    
                   </p>
                   <p>
                    <input type="submit" value="submit">
                    <input type="reset" value="reset">
                   </p>
                   <p>
                    Already Have an Account?<a href="Sign.html">Login</a>
                   </p>
                </form>
            </fieldset>
         </div>
        <!--Validation-->
        <div class="Validation">
            <script>
                  function validform(){
                   let email=document.getElementById("Email").value;
                   let password=document.getElementById("Create_Password").value;
                   let phone=document.getElementById("Phone_Number").value;
                   if(email==""||password==""){
                    alert("Please Enter your details");
                    return false;
                   }
                   if(!email.includes("@")||!email.includes(".")){
                    alert("Please Enter a valid email");
                    return false;
                   }
                   if(phone.length<10){
                    alert("Please Enter a Valid Phone Number");
                    return false;
                   }
                   else{
                    alert("You have logged in successfully");
                    return true;
                   }
                }
            </script>
        </div>
         <!--Footer-->
         <div class="Footer">
            <p>&copy; Vaibhav 2026</p>
         </div>
    </body>
</html>
